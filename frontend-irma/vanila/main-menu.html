<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prospera - Main Menu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo px-2"><i class="fas fa-layer-group"></i> <span>Prospera</span></div>
        <ul class="nav flex-column">
            <li class="nav-item"><a href="analytics.html" class="nav-link"><i class="fas fa-layer-group"></i> Full Analytics</a></li>
            <li class="nav-item"><a href="main-menu.html" class="nav-link active"><i class="fas fa-th-large"></i> Dashboard</a></li>
            <li class="nav-item"><a href="bi-analytics.html" class="nav-link"><i class="fas fa-chart-bar"></i> 4.2 Analitik (BI)</a></li>
            <li class="nav-item"><a href="smart-predict.html" class="nav-link"><i class="fas fa-robot"></i> 4.3 Fitur Pintar</a></li>
            <li class="nav-item mt-4"><hr class="text-white-50"></li>
            <li class="nav-item"><a href="index.html" class="nav-link text-warning"><i class="fas fa-undo"></i> Back to Original</a></li>
        </ul>
    </div>

    <!-- Main Content (Sama dengan index asli) -->
    <div class="main-content">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 fw-bold">Main Dashboard</h1>
            <div class="avatar rounded-circle">IT</div>
        </header>

        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="stat-card shadow-sm border-0">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <small class="text-muted">Total Penjualan</small>
                            <div class="h4 fw-bold">Rp 1.245.000</div>
                        </div>
                        <div class="stat-icon text-muted">
                            <i class="fas fa-shopping-bag fa-lg"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card shadow-sm border-0">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <small class="text-muted">Laba Bersih</small>
                            <div class="h4 fw-bold">Rp 793.000</div>
                        </div>
                        <div class="stat-icon text-muted">
                            <i class="fas fa-hand-holding-usd fa-lg"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card shadow-sm border-0">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <small class="text-muted">Total Pengeluaran</small>
                            <div class="h4 fw-bold">Rp 452.000</div>
                        </div>
                        <div class="stat-icon text-muted">
                            <i class="fas fa-file-invoice-dollar fa-lg"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card shadow-sm border-0">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <small class="text-muted">Margin Laba</small>
                            <div class="h4 fw-bold">63.7%</div>
                        </div>
                        <div class="stat-icon text-muted">
                            <i class="fas fa-percentage fa-lg"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm p-4">
            <h5 class="fw-bold">Overview Chart</h5>
            <canvas id="timeSeriesChart" style="max-height: 300px;"></canvas>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
