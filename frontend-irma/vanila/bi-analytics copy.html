<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prospera - Analitik Bisnis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .bi-card { border-top: 4px solid var(--blue-medium); }
        .chart-container { position: relative; height: 350px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="sidebar">
        <div class="logo px-2"><i class="fas fa-layer-group"></i> <span>Prospera</span></div>
        <ul class="nav flex-column">
            <li class="nav-item"><a href="analytics.html" class="nav-link"><i class="fas fa-layer-group"></i> Analisis Lengkap</a></li>
            <li class="nav-item"><a href="bi-analytics.html" class="nav-link active"><i class="fas fa-chart-bar"></i> 4.2 Analitik Bisnis</a></li>
            <li class="nav-item"><a href="smart-predict.html" class="nav-link"><i class="fas fa-robot"></i> 4.3 Fitur Pintar</a></li>
        </ul>
    </div>

    <div class="main-content">
        <h2 class="fw-bold mb-4">4.2 Fitur Analitik (Business Intelligence)</h2>

        <!-- BUKA: 4.2.4 Sales Summary & 4.2.1 Profit and Loss Tracking -->
        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="stat-card bi-card shadow-sm">
                    <small class="text-muted">Total Pendapatan</small>
                    <div class="h4 fw-bold" id="bi-sales-val">Rp 0</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card bi-card shadow-sm">
                    <small class="text-muted">Laba Bersih (P&L)</small>
                    <div class="h4 fw-bold text-success" id="bi-profit-val">Rp 0</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card bi-card shadow-sm">
                    <small class="text-muted">Jumlah Transaksi</small>
                    <div class="h4 fw-bold" id="bi-trans-val">0</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card bi-card shadow-sm">
                    <small class="text-muted">Margin Keuntungan</small>
                    <div class="h4 fw-bold text-primary" id="bi-margin-val">0%</div>
                </div>
            </div>
        </div>
        <!-- TUTUP: 4.2.4 Sales Summary & 4.2.1 Profit and Loss Tracking -->

        <div class="row g-4">
            <!-- BUKA: 4.2.3 Time Series Analysis -->
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm p-4">
                    <div class="d-flex justify-content-between mb-4">
                        <h5 class="fw-bold">Tren Penjualan & Laba</h5>
                        <select class="form-select form-select-sm w-auto" id="trend-period">
                            <option value="monthly">Tren Bulanan</option>
                            <option value="daily">Tren Harian (April)</option>
                        </select>
                    </div>
                    <div class="chart-container">
                        <canvas id="biChart"></canvas>
                    </div>
                </div>
            </div>
            <!-- TUTUP: 4.2.3 Time Series Analysis -->

            <!-- BUKA: 4.2.2 Top Performance -->
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm p-4">
                    <h5 class="fw-bold mb-3">Produk Terlaris (Profit)</h5>
                    <div class="table-responsive">
                        <table class="table table-borderless align-middle">
                            <tbody id="top-perf-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
            <!-- TUTUP: 4.2.2 Top Performance -->
        </div>
    </div>
    <script src="js/logika-bi.js"></script>
</body>
</html>
